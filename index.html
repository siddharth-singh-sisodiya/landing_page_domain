<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<meta name="description" content="Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8102E;
    --ink: #0B0B0C;
    --paper: #F5F0E6;
    --charcoal: #2B2B2B;
    --amber: #D4A72C;
    --paper-shadow: #E8DFC9;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at top left, rgba(200,16,46,0.05), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(11,11,12,0.05), transparent 55%);
    color: var(--charcoal);
    font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 24px;
    overflow-x: hidden;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 640px;
    width: 100%;
  }

  /* ---- Badge ---- */
  .badge-wrap {
    position: relative;
    width: min(360px, 78vw);
    height: min(360px, 78vw);
    margin-bottom: 40px;
    opacity: 0;
    transform: scale(0.85);
    animation: badge-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
  }

  @keyframes badge-in {
    to { opacity: 1; transform: scale(1); }
  }

  .badge-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .spin-text {
    animation: spin 40s linear infinite;
    transform-origin: 250px 250px;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .blink {
    animation: blink 5s ease-in-out infinite;
    transform-origin: 250px 250px;
  }

  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(2.1rem, 7vw, 3.4rem);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 14px;
    opacity: 0;
    animation: rise-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
  }

  h1 span {
    color: var(--red);
  }

  .tagline {
    font-size: clamp(1.05rem, 2.6vw, 1.2rem);
    font-style: italic;
    color: var(--charcoal);
    opacity: 0;
    margin: 0 0 36px;
    max-width: 460px;
    line-height: 1.55;
    animation: rise-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.68s forwards;
  }

  @keyframes rise-in {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    width: 64px;
    height: 3px;
    background: var(--red);
    border-radius: 2px;
    margin-bottom: 28px;
    opacity: 0;
    animation: rise-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
  }

  .footnote {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--charcoal);
    opacity: 0;
    animation: rise-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards;
  }

  .footnote::before {
    content: "— ";
  }

  .footnote::after {
    content: " —";
  }

  @media (prefers-reduced-motion: reduce) {
    .badge-wrap, h1, .tagline, .divider, .footnote, .spin-text, .blink {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
    }
  }

  :focus-visible {
    outline: 3px solid var(--red);
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <main class="stage">
    <div class="badge-wrap" aria-hidden="true">
      <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
        <!-- outer ring -->
        <circle cx="250" cy="250" r="235" fill="none" stroke="var(--ink)" stroke-width="3"/>
        <circle cx="250" cy="250" r="222" fill="none" stroke="var(--ink)" stroke-width="1.5"/>
        <circle cx="250" cy="250" r="180" fill="none" stroke="var(--ink)" stroke-width="1"/>

        <!-- rotating rim text -->
        <g class="spin-text">
          <defs>
            <path id="rimTop" d="M 250,250 m -204,0 a 204,204 0 1,1 408,0" />
            <path id="rimBottom" d="M 250,250 m 204,0 a 204,204 0 1,1 -408,0" />
          </defs>
          <text font-family="Oswald, sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="var(--ink)">
            <textPath href="#rimTop" startOffset="50%" text-anchor="middle">COMING SOON</textPath>
          </text>
          <text font-family="Oswald, sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="var(--red)">
            <textPath href="#rimBottom" startOffset="50%" text-anchor="middle">EST. 2026 &#8226; ON DUTY</textPath>
          </text>
          <!-- small stars between phrases -->
          <circle cx="250" cy="46" r="3.5" fill="var(--red)"/>
          <circle cx="250" cy="454" r="3.5" fill="var(--ink)"/>
        </g>

        <!-- inner seal background -->
        <circle cx="250" cy="250" r="172" fill="var(--paper-shadow)" stroke="var(--ink)" stroke-width="1.5"/>

        <!-- ==== ILLUSTRATION: owl perched on fire extinguisher ==== -->
        <g>
          <!-- ground line -->
          <line x1="140" y1="370" x2="360" y2="370" stroke="var(--ink)" stroke-width="2"/>

          <!-- fire extinguisher body -->
          <g>
            <!-- hose -->
            <path d="M 226,240 C 205,250 195,265 200,280 C 204,292 216,296 226,292" fill="none" stroke="var(--ink)" stroke-width="3.5" stroke-linecap="round"/>
            <!-- nozzle -->
            <path d="M 226,292 L 235,300" stroke="var(--ink)" stroke-width="4" stroke-linecap="round"/>

            <!-- handle -->
            <path d="M 250,205 L 250,190 C 250,182 258,178 266,182 L 278,188" fill="none" stroke="var(--ink)" stroke-width="4" stroke-linecap="round"/>
            <circle cx="253" cy="200" r="4" fill="none" stroke="var(--ink)" stroke-width="2.5"/>

            <!-- cylinder top nozzle valve -->
            <rect x="238" y="208" width="28" height="14" rx="3" fill="var(--paper)" stroke="var(--ink)" stroke-width="3"/>

            <!-- main tank -->
            <path d="M 214,225
                     Q 214,222 220,222
                     L 284,222
                     Q 290,222 290,225
                     L 296,340
                     Q 297,370 252,372
                     Q 207,370 208,340
                     Z"
                  fill="var(--red)" stroke="var(--ink)" stroke-width="3.5"/>

            <!-- pressure gauge -->
            <circle cx="252" cy="248" r="12" fill="var(--paper)" stroke="var(--ink)" stroke-width="2.5"/>
            <line x1="252" y1="248" x2="257" y2="242" stroke="var(--ink)" stroke-width="2" stroke-linecap="round"/>

            <!-- instruction label -->
            <rect x="222" y="270" width="60" height="34" rx="2" fill="var(--paper)" stroke="var(--ink)" stroke-width="2"/>
            <line x1="230" y1="279" x2="274" y2="279" stroke="var(--ink)" stroke-width="1.5"/>
            <line x1="230" y1="287" x2="274" y2="287" stroke="var(--ink)" stroke-width="1.5"/>
            <line x1="230" y1="295" x2="264" y2="295" stroke="var(--ink)" stroke-width="1.5"/>

            <!-- base ring -->
            <ellipse cx="252" cy="368" rx="46" ry="7" fill="none" stroke="var(--ink)" stroke-width="3"/>
          </g>

          <!-- OWL perched on top of extinguisher -->
          <g class="blink">
            <!-- feet gripping the valve top -->
            <path d="M 238,216 Q 234,222 240,224" fill="none" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>
            <path d="M 266,216 Q 270,222 264,224" fill="none" stroke="var(--ink)" stroke-width="3" stroke-linecap="round"/>

            <!-- body -->
            <path d="M 252,120
                     C 214,120 198,152 200,188
                     C 202,212 218,220 252,220
                     C 286,220 302,212 304,188
                     C 306,152 290,120 252,120 Z"
                  fill="var(--ink)"/>

            <!-- chest feather texture -->
            <path d="M 228,165 Q 233,172 228,180 Q 233,187 228,194 Q 233,201 229,207" fill="none" stroke="var(--paper)" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
            <path d="M 252,168 Q 257,175 252,183 Q 257,190 252,197 Q 257,204 253,210" fill="none" stroke="var(--paper)" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
            <path d="M 276,165 Q 281,172 276,180 Q 281,187 276,194 Q 281,201 277,207" fill="none" stroke="var(--paper)" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>

            <!-- wings folded -->
            <path d="M 205,150 C 196,168 195,192 208,212 C 214,205 214,180 214,160 Z" fill="var(--ink)" stroke="var(--ink)" stroke-width="2"/>
            <path d="M 299,150 C 308,168 309,192 296,212 C 290,205 290,180 290,160 Z" fill="var(--ink)" stroke="var(--ink)" stroke-width="2"/>

            <!-- ear tufts -->
            <path d="M 218,120 L 210,96 L 232,114 Z" fill="var(--ink)"/>
            <path d="M 286,120 L 294,96 L 272,114 Z" fill="var(--ink)"/>

            <!-- facial disc -->
            <circle cx="252" cy="148" r="42" fill="var(--ink)"/>
            <circle cx="252" cy="148" r="38" fill="none" stroke="var(--paper)" stroke-width="1.4" opacity="0.45"/>

            <!-- eyes -->
            <circle cx="235" cy="146" r="15" fill="var(--paper)"/>
            <circle cx="269" cy="146" r="15" fill="var(--paper)"/>
            <circle cx="235" cy="146" r="14.5" fill="none" stroke="var(--ink)" stroke-width="1.5"/>
            <circle cx="269" cy="146" r="14.5" fill="none" stroke="var(--ink)" stroke-width="1.5"/>
            <circle cx="236" cy="147" r="7" fill="var(--amber)"/>
            <circle cx="270" cy="147" r="7" fill="var(--amber)"/>
            <circle cx="236" cy="147" r="3.2" fill="var(--ink)"/>
            <circle cx="270" cy="147" r="3.2" fill="var(--ink)"/>
            <circle cx="233.5" cy="144.5" r="1.4" fill="var(--paper)"/>
            <circle cx="267.5" cy="144.5" r="1.4" fill="var(--paper)"/>

            <!-- beak -->
            <path d="M 246,162 L 258,162 L 252,176 Z" fill="var(--amber)"/>

            <!-- brow furrow (gives it a stern "on duty" look) -->
            <path d="M 222,132 Q 235,126 248,132" fill="none" stroke="var(--paper)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <path d="M 256,132 Q 269,126 282,132" fill="none" stroke="var(--paper)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          </g>
        </g>

        <!-- small flame-glyph accents flanking the scene -->
        <g fill="var(--red)" opacity="0.85">
          <path d="M 168,330 C 164,320 170,312 168,304 C 176,308 180,318 174,328 C 172,331 170,331 168,330 Z"/>
          <path d="M 336,330 C 332,320 338,312 336,304 C 344,308 348,318 342,328 C 340,331 338,331 336,330 Z"/>
        </g>
      </svg>
    </div>

    <h1>Coming <span>Soon</span></h1>
    <div class="divider"></div>
    <p class="tagline">A new outfit is being assembled — equal parts vigilance and readiness. The owl is watching. The extinguisher is charged. Details incoming.</p>
    <p class="footnote">Check back shortly</p>
  </main>
</body>
</html>
