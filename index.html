<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>
<meta name="description" content="Coming soon.">
<style>
  :root {
    --black: #000000;
    --green-dim: #0d3b1e;
    --green-mid: #16c45a;
    --green-bright: #6bff9e;
    --green-glow: #00ff66;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--black);
    overflow: hidden;
    height: 100%;
    width: 100%;
  }

  body {
    font-family: 'Courier New', ui-monospace, 'SF Mono', Menlo, monospace;
    color: var(--green-mid);
  }

  canvas#rain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: block;
  }

  .veil {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.75) 68%, rgba(0,0,0,0.92) 100%);
    pointer-events: none;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }

  .prompt {
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    letter-spacing: 0.15em;
    color: var(--green-mid);
    opacity: 0;
    margin: 0 0 18px;
    text-transform: uppercase;
    animation: flicker-in 0.6s steps(2) 0.2s forwards;
  }

  .prompt::before {
    content: "> ";
    color: var(--green-bright);
  }

  h1 {
    font-size: clamp(2.4rem, 9vw, 5.4rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin: 0 0 22px;
    color: var(--green-bright);
    text-shadow:
      0 0 6px var(--green-glow),
      0 0 18px rgba(0,255,102,0.55),
      0 0 40px rgba(0,255,102,0.3);
    opacity: 0;
    animation: flicker-in 0.9s steps(6) 0.4s forwards;
    position: relative;
  }

  .cursor {
    display: inline-block;
    width: 0.5em;
    background: var(--green-bright);
    box-shadow: 0 0 8px var(--green-glow);
    animation: blink-cursor 1s step-end infinite;
    margin-left: 6px;
  }

  @keyframes blink-cursor {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .tagline {
    font-size: clamp(0.85rem, 2.2vw, 1.05rem);
    color: var(--green-mid);
    max-width: 520px;
    line-height: 1.75;
    opacity: 0;
    margin: 0 0 30px;
    animation: flicker-in 0.7s steps(4) 0.9s forwards;
  }

  .divider {
    width: 100%;
    max-width: 360px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-mid), transparent);
    margin-bottom: 26px;
    opacity: 0;
    animation: flicker-in 0.6s steps(3) 1.1s forwards;
  }

  .status {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--green-dim);
    opacity: 0;
    animation: flicker-in 0.6s steps(3) 1.3s forwards;
  }

  .status .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green-bright);
    box-shadow: 0 0 6px var(--green-glow);
    margin-right: 8px;
    vertical-align: middle;
    animation: pulse-dot 1.8s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes flicker-in {
    0% { opacity: 0; }
    30% { opacity: 0.4; }
    45% { opacity: 0.05; }
    60% { opacity: 0.8; }
    100% { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .prompt, h1, .tagline, .divider, .status, .cursor, .status .dot {
      animation: none !important;
      opacity: 1 !important;
    }
  }

  :focus-visible {
    outline: 2px solid var(--green-bright);
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <canvas id="rain" aria-hidden="true"></canvas>
  <div class="veil"></div>

  <main class="stage">
    <p class="prompt">system status</p>
    <h1>COMING SOON<span class="cursor">&nbsp;</span></h1>
    <div class="divider"></div>
    <p class="tagline">The signal is being prepared. Stay connected — access is being compiled.</p>
    <p class="status"><span class="dot"></span>Check back shortly</p>
  </main>

  <script>
    (function () {
      var canvas = document.getElementById('rain');
      var ctx = canvas.getContext('2d');
      var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      var fontSize = 18;
      var columns, drops, speeds;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.floor(canvas.width / fontSize);
        drops = new Array(columns).fill(0).map(function () {
          return Math.random() * -100;
        });
        speeds = new Array(columns).fill(0).map(function () {
          return 0.4 + Math.random() * 0.9;
        });
      }

      resize();
      window.addEventListener('resize', resize);

      var chars = '01';

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = fontSize + 'px monospace';

        for (var i = 0; i < columns; i++) {
          var char = chars[Math.floor(Math.random() * chars.length)];
          var x = i * fontSize;
          var y = drops[i] * fontSize;

          var isHead = Math.random() > 0.94;
          if (isHead) {
            ctx.fillStyle = '#c9ffdc';
            ctx.shadowColor = '#00ff66';
            ctx.shadowBlur = 8;
          } else {
            var alpha = 0.35 + Math.random() * 0.4;
            ctx.fillStyle = 'rgba(22, 196, 90, ' + alpha + ')';
            ctx.shadowBlur = 0;
          }

          ctx.fillText(char, x, y);
          ctx.shadowBlur = 0;

          if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += speeds[i];
        }
      }

      if (reduceMotion) {
        // Draw a single static-ish frame and stop, respecting reduced motion.
        for (var f = 0; f < 40; f++) draw();
      } else {
        setInterval(draw, 45);
      }
    })();
  </script>
</body>
</html>
